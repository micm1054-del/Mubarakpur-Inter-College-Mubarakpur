<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mubarakpur Inter College Result</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
    text-align: center;
}

/* Top Bar */
.topbar {
    background: #111;
    padding: 15px;
}

/* Title */
.title {
    margin: 0;
    padding-bottom: 10px;
    font-size: 22px;
    font-weight: bold;
    color: #fff;
}

/* Input & Button */
input {
    padding: 10px;
    width: 200px;
    border: none;
    outline: none;
}

button {
    padding: 10px 15px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

/* Result Image */
#result img {
    width: 100%;
    height: auto;
    max-height: 100vh;
    object-fit: contain;
    cursor: zoom-in;
}

/* Modal Fullscreen */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: black;
}

.modal img {
    margin: auto;
    display: block;
    width: 100%;
    height: auto;
}

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="topbar">
    <h1 class="title">Mubarakpur Inter College Mubarakpur</h1>

    <input type="text" id="roll" placeholder="Enter Roll Number">
    <button onclick="showResult()">Search</button>
</div>

<div id="result"></div>

<!-- Fullscreen Modal -->
<div id="myModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="modalImg">
</div>

<script>
function showResult() {
    let roll = document.getElementById("roll").value.trim();
    let imgPath = "results/" + roll + ".jpg";

    let img = new Image();
    img.src = imgPath;

    img.onload = function() {
        document.getElementById("result").innerHTML =
            "<img src='" + imgPath + "' onclick='openModal(this.src)'>";
    };

    img.onerror = function() {
        document.getElementById("result").innerHTML =
            "<h3>❌ Result not found</h3>";
    };
}

// Open Fullscreen
function openModal(src) {
    document.getElementById("myModal").style.display = "block";
    document.getElementById("modalImg").src = src;
}

// Close Fullscreen
function closeModal() {
    document.getElementById("myModal").style.display = "none";
}
</script>

</body>
</html>
